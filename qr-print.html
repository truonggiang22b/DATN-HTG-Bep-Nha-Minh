<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Codes — Bếp Nhà Mình</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    /* ── Reset & Base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f5f0;
      padding: 24px;
      color: #1a1a1a;
    }

    h1.page-title {
      text-align: center;
      font-size: 18px;
      color: #555;
      margin-bottom: 28px;
      font-weight: 400;
      letter-spacing: 1px;
    }

    /* ── Grid ─────────────────────────────────────────────────── */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── Card ─────────────────────────────────────────────────── */
    .card {
      width: 240px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 20px;
      page-break-inside: avoid;
    }

    /* ── Header band ──────────────────────────────────────────── */
    .card-header {
      width: 100%;
      background: linear-gradient(135deg, #e8521a 0%, #c0392b 100%);
      padding: 18px 12px 14px;
      text-align: center;
      color: #fff;
    }

    .brand-icon {
      font-size: 28px;
      display: block;
      margin-bottom: 4px;
    }

    .brand-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .brand-sub {
      font-size: 10px;
      opacity: 0.85;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── QR area ──────────────────────────────────────────────── */
    .qr-wrap {
      margin: 18px 0 12px;
      padding: 12px;
      background: #fff;
      border-radius: 12px;
      border: 2px solid #f0ece6;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .qr-wrap canvas { display: block; }

    /* ── Table badge ──────────────────────────────────────────── */
    .table-badge {
      background: #fff5f0;
      border: 2px solid #e8521a;
      color: #e8521a;
      font-size: 22px;
      font-weight: 800;
      border-radius: 50px;
      padding: 4px 24px;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .scan-hint {
      font-size: 11px;
      color: #888;
      text-align: center;
      padding: 0 16px;
      line-height: 1.5;
    }

    .scan-hint strong { color: #e8521a; }

    /* ── URL small text ───────────────────────────────────────── */
    .url-text {
      font-size: 8px;
      color: #bbb;
      margin-top: 8px;
      word-break: break-all;
      text-align: center;
      padding: 0 12px;
    }

    /* ── Print styles ─────────────────────────────────────────── */
    @media print {
      body {
        background: #fff;
        padding: 12px;
      }

      h1.page-title { display: none; }

      .grid {
        gap: 16px;
      }

      .card {
        box-shadow: none;
        border: 1.5px solid #ddd;
        width: 200px;
      }

      @page {
        size: A4;
        margin: 12mm;
      }
    }
  </style>
</head>
<body>

<h1 class="page-title">🖨️ In QR Code — Bếp Nhà Mình &nbsp;|&nbsp; Bấm Ctrl+P để in</h1>

<div class="grid" id="qr-grid">
  <!-- Cards sẽ được render bằng JS -->
</div>

<script>
  const BASE_URL = 'https://datn-htg-bep-nha-minh.vercel.app/qr';

  const tables = [
    { id: 'qr-bnm-table-01', label: 'Bàn 01' },
    { id: 'qr-bnm-table-02', label: 'Bàn 02' },
    { id: 'qr-bnm-table-03', label: 'Bàn 03' },
    { id: 'qr-bnm-table-04', label: 'Bàn 04' },
    { id: 'qr-bnm-table-05', label: 'Bàn 05' },
  ];

  const grid = document.getElementById('qr-grid');

  tables.forEach(({ id, label }) => {
    const url = `${BASE_URL}/${id}`;

    // Card HTML
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <span class="brand-icon">🍳</span>
        <div class="brand-name">Bếp Nhà Mình</div>
        <div class="brand-sub">QR Ordering</div>
      </div>
      <div class="qr-wrap">
        <canvas id="qr-${id}"></canvas>
      </div>
      <div class="table-badge">${label}</div>
      <p class="scan-hint">
        Quét QR để xem menu &amp; <strong>đặt món ngay</strong><br>
        Không cần cài app
      </p>
      <div class="url-text">${url}</div>
    `;
    grid.appendChild(card);

    // Generate QR
    QRCode.toCanvas(
      document.getElementById(`qr-${id}`),
      url,
      { width: 160, margin: 1, color: { dark: '#1a1a1a', light: '#ffffff' } },
      (err) => { if (err) console.error(id, err); }
    );
  });
</script>

</body>
</html>
